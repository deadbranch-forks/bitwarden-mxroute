name: bitwarden-mxroute

x-runtime:
  identity:
    user: &user "742:742"
  resource-limits:
    bitwarden-mxroute:
      compute: &compute_limits_bitwarden-mxroute
        cpus: "1.0"
        mem_reservation: "32m"
        mem_limit: "64m"
        memswap_limit: "82m"
        pids_limit: 256

services:
  bitwarden-mxroute:
    container_name: bitwarden-mxroute
    image: ghcr.io/deadbranches-agent/bitwarden-mxroute
    labels:
      STACK: bitwarden-mxroute
      SERVICE: bitwarden-mxroute
    <<: *compute_limits_bitwarden-mxroute
    user: *user
    ports:
      - "6123:6123"
    env_file: /srv/bitwarden-mxroute/secrets/bitwarden-mxroute.env
    secrets:
      - api_key
    volumes:
      - "/opt/bitwarden-mxroute/conf/gunicorn.conf.py:/usr/local/bin/gunicorn.conf.py"
      - "/srv/bitwarden-mxroute/data:/app"
    networks: [http_net]
    stop_grace_period: 1m30s
    restart: unless-stopped
    environment:
      TZID: "America/New_York"
    healthcheck:
      test: >-
        CMD-SHELL python -c "
        import urllib.request;
        urllib.request.urlopen(
          urllib.request.Request(
            'http://127.0.0.1:6123/',
            headers={'Authorization': 'Bearer ' + open('/run/secrets/api_key').read().strip()}
          )
        )"
      interval: 142s
      timeout: 11s
      retries: 3

secrets:
  api_key:
    file: /srv/bitwarden-mxroute/secrets/bitwarden-mxroute-api-key.txt

networks:
  http_net:
    name: http_net
    external: true
