# ── Development overrides ────────────────────────────────────
# Layer this on top of the production compose:
#
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
#
# Or set COMPOSE_FILE in your shell / .env:
#   COMPOSE_FILE=docker-compose.yaml:docker-compose.dev.yaml
# ─────────────────────────────────────────────────────────────
services:
  bitwarden-mxroute:
    # Build locally instead of pulling the GHCR image.
    image: bitwarden-mxroute:dev
    build:
      context: /opt/bitwarden-mxroute/build
      dockerfile: Dockerfile.dev

    # Relax resource limits — the production 64 MB ceiling is
    # tight once you add debugpy + reload overhead.
    mem_limit: "128m"
    memswap_limit: "160m"

    # Bind-mount source for hot reload.
    volumes:
      - "/srv/bitwarden-mxroute/data:/app"

    # Expose debugpy port for remote attach (VS Code, PyCharm).
    ports:
      - "5678:5678"

    environment:
      FLASK_ENV: "development"
      FLASK_DEBUG: "1"
      # Set to "1" to start debugpy listener on boot.
      # Attach from your editor at <tailscale-ip>:5678.
      DEBUGPY_ENABLE: "0"

    # Faster restarts during iteration.
    stop_grace_period: 5s
