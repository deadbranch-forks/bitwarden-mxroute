name: Build ARM64 Docker images

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: "Version suffix (e.g. v1, v2, v3)"
        required: true
        default: "v1"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: build-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Produces e.g. "2026.03.14-v1" — shared by both build steps
      - name: Compute version tag
        id: version
        run: |
          DATE=$(date -u +'%Y.%m.%d')
          VERSION="${DATE}-${{ inputs.version_suffix }}"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      # QEMU + Buildx MUST come before any build-push-action step
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Production image ──────────────────────────────────────────
      - name: Extract metadata for prod image
        id: meta-prod
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push prod image (linux/arm64/v8)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64/v8
          push: true
          tags: ${{ steps.meta-prod.outputs.tags }}
          labels: ${{ steps.meta-prod.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # ── Visibility ───────────────────────────────────────────────
      # GHCR defaults new packages to private.  GITHUB_TOKEN cannot
      # change visibility — a classic PAT with write:packages is
      # required (stored as PAT_PACKAGES).
      - name: Ensure container package is public
        if: github.event.repository.visibility == 'public'
        run: |
          PACKAGE=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/${PACKAGE}" \
            -f visibility=public
        env:
          GH_TOKEN: ${{ secrets.PAT_PACKAGES }}

      # ── Dev image ─────────────────────────────────────────────────
      # Runs after prod so the python:3.14-slim-trixie base layer
      # pulled under QEMU emulation is already cached
      - name: Extract metadata for dev image
        id: meta-dev
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}-dev
            type=raw,value=dev

      - name: Build and push dev image (linux/arm64/v8)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.dev
          platforms: linux/arm64/v8
          push: true
          tags: ${{ steps.meta-dev.outputs.tags }}
          labels: ${{ steps.meta-dev.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
